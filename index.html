<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Monsoon Empire</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <h1>Monsoon Empire</h1>
        <p>Build an English trading company across the Indian Ocean.</p>
      </div>
      <div class="top-stats">
        <span id="turnLabel">Month 1</span>
        <span id="moneyLabel">£2,500</span>
        <span id="shipCountLabel">1 Ship</span>
      </div>
    </header>

    <main class="layout">
      <section class="map-panel">
        <div class="map-title-row">
          <h2>Company Map</h2>
          <button id="nextTurnBtn" class="primary-btn">End Month</button>
        </div>
        <div id="map" class="map"></div>
      </section>

      <aside class="side-panel">
        <section class="card">
          <h2 id="selectedPortName">London</h2>
          <p id="selectedPortDesc">Your home port. Build ships and sell Eastern goods here.</p>
          <div id="portDetails" class="details"></div>
        </section>

        <section class="card">
          <h2>Your Company</h2>
          <div id="companyDetails" class="details"></div>
        </section>

        <section class="card">
          <h2>Actions</h2>
          <div id="actions" class="actions"></div>
        </section>
      </aside>
    </main>

    <section class="bottom-grid">
      <section class="card">
        <h2>Fleet</h2>
        <div id="fleetList" class="list"></div>
      </section>

      <section class="card">
        <h2>Cargo</h2>
        <div id="cargoList" class="list"></div>
      </section>

      <section class="card">
        <h2>Rival Companies</h2>
        <div id="rivalsList" class="list"></div>
      </section>

      <section class="card log-card">
        <h2>Company Log</h2>
        <div id="log" class="log"></div>
      </section>
    </section>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <h2 id="modalTitle">Title</h2>
      <p id="modalText">Text</p>
      <button id="modalCloseBtn" class="primary-btn">Continue</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
